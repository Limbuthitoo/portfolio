<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0418"/><stop offset="100%" stop-color="#14082e"/></linearGradient>
    <linearGradient id="pur" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#6D28D9"/></linearGradient>
    <radialGradient id="g1" cx="50%" cy="50%"><stop offset="0%" stop-color="#10B981" stop-opacity=".1"/><stop offset="100%" stop-color="#10B981" stop-opacity="0"/></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/><rect width="1200" height="800" fill="url(#g1)"/>
  <!-- Mobile frame -->
  <rect x="400" y="40" width="400" height="720" rx="40" fill="#0d0d1a" stroke="#2d1b69" stroke-width="2"/>
  <rect x="540" y="40" width="120" height="30" rx="15" fill="#000"/>
  <text x="430" y="80" fill="#fff" font-family="system-ui" font-size="14" opacity=".6">9:41</text>
  <!-- Meditation session view -->
  <rect x="430" y="100" width="340" height="44" fill="#120e24"/>
  <rect x="450" y="114" width="60" height="10" rx="5" fill="#8B5CF6" opacity=".4"/>
  <rect x="720" y="112" width="30" height="18" rx="6" fill="#1a1035" stroke="#2d1b69"/>
  <!-- Session active -->
  <rect x="430" y="144" width="340" height="516" fill="#0a0818"/>
  <!-- Central breathing circle -->
  <circle cx="600" cy="340" r="100" fill="none" stroke="#8B5CF6" stroke-width="2" opacity=".2"/>
  <circle cx="600" cy="340" r="80" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity=".15"/>
  <circle cx="600" cy="340" r="60" fill="none" stroke="#00F0FF" stroke-width="1" opacity=".2"/>
  <circle cx="600" cy="340" r="40" fill="url(#pur)" opacity=".15"/>
  <text x="575" y="346" fill="#8B5CF6" font-family="system-ui" font-size="18" font-weight="bold" opacity=".7">Inhale</text>
  <!-- Biometric readouts -->
  <rect x="450" y="490" width="140" height="70" rx="10" fill="#1a1035" stroke="#2d1b69"/>
  <rect x="468" y="506" width="40" height="6" rx="3" fill="#2d1b69" opacity=".3"/>
  <text x="468" y="538" fill="#10B981" font-family="system-ui" font-size="22" font-weight="bold" opacity=".6">72</text>
  <text x="504" y="538" fill="#2d1b69" font-family="system-ui" font-size="10" opacity=".4">bpm</text>
  <rect x="610" y="490" width="140" height="70" rx="10" fill="#1a1035" stroke="#2d1b69"/>
  <rect x="628" y="506" width="50" height="6" rx="3" fill="#2d1b69" opacity=".3"/>
  <text x="628" y="538" fill="#8B5CF6" font-family="system-ui" font-size="22" font-weight="bold" opacity=".6">94%</text>
  <!-- Timer -->
  <rect x="480" y="580" width="240" height="50" rx="12" fill="#1a1035" stroke="#2d1b69"/>
  <text x="555" y="612" fill="#fff" font-family="system-ui" font-size="24" font-weight="bold" opacity=".5">12:34</text>
  <!-- Control -->
  <circle cx="600" cy="660" r="24" fill="url(#pur)" opacity=".5"/>
  <!-- Nav -->
  <rect x="430" y="680" width="340" height="60" rx="0" fill="#120e24"/>
  <circle cx="490" cy="710" r="12" fill="#2d1b69" opacity=".3"/><circle cx="560" cy="710" r="12" fill="#2d1b69" opacity=".3"/><circle cx="630" cy="710" r="12" fill="url(#pur)" opacity=".4"/><circle cx="700" cy="710" r="12" fill="#2d1b69" opacity=".3"/>
  <circle cx="600" cy="340" r="160" fill="#10B981" opacity=".03" filter="url(#glow)"/>
</svg>